<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Intelligence Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 30px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .nav-links a:hover {
      opacity: 0.8;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #333;
    }

    .page-header p {
      color: #666;
      font-size: 16px;
    }

    .search-form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .search-form input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    .search-form input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.3s;
    }

    .button:hover {
      background: #764ba2;
    }

    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .business-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .business-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      border-color: #667eea;
      transform: translateY(-2px);
    }

    .business-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
      gap: 10px;
    }

    .business-header h3 {
      font-size: 18px;
      margin: 0;
      color: #333;
      flex: 1;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge.active {
      background: #d4edda;
      color: #155724;
    }

    .status-badge.inactive {
      background: #fff3cd;
      color: #856404;
    }

    .category {
      color: #667eea;
      font-weight: 600;
      font-size: 14px;
      margin: 0 0 5px 0;
    }

    .address {
      color: #666;
      font-size: 13px;
      margin: 0;
    }

    .business-stats {
      display: flex;
      gap: 15px;
      margin: 12px 0;
      padding: 12px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    .rating {
      font-size: 16px;
      font-weight: bold;
      color: #ff9800;
    }

    .phone {
      margin: 8px 0;
      color: #333;
      font-size: 14px;
    }

    .website {
      display: inline-block;
      margin-top: 10px;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .website:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 18px;
    }

    .stats-section {
      margin-top: 40px;
      text-align: center;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .metric-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      text-align: center;
    }

    .metric-card h3 {
      margin: 0 0 15px 0;
      font-size: 14px;
      font-weight: 600;
      opacity: 0.9;
    }

    .metric-value {
      margin: 0;
      font-size: 32px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }

    .tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab:hover {
      color: #667eea;
    }

    .results-count {
      color: #666;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE = 'http://localhost:3000/api/v1';

    function App() {
      const [page, setPage] = React.useState('search');
      const [query, setQuery] = React.useState('');
      const [results, setResults] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [metrics, setMetrics] = React.useState(null);
      const [searchType, setSearchType] = React.useState('text');
      const [filters, setFilters] = React.useState({ city: '', category: '' });

      const handleSearch = async (e) => {
        e.preventDefault();
        if (!query.trim()) return;

        setLoading(true);
        try {
          let url;
          if (searchType === 'text') {
            url = `${API_BASE}/search?query=${encodeURIComponent(query)}`;
          } else if (searchType === 'category') {
            url = `${API_BASE}/search/category/${encodeURIComponent(query)}`;
          }

          const response = await fetch(url);
          const data = await response.json();
          setResults(data.businesses || data);
        } catch (err) {
          alert('Search failed: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      const loadAnalytics = async () => {
        try {
          const response = await fetch(`${API_BASE}/analytics/metrics`);
          const data = await response.json();
          setMetrics(data);
        } catch (err) {
          console.error('Failed to load analytics:', err);
        }
      };

      const handleLocationSearch = async (e) => {
        e.preventDefault();
        if (!filters.city.trim()) return;

        setLoading(true);
        try {
          const url = `${API_BASE}/search/location?city=${encodeURIComponent(filters.city)}`;
          const response = await fetch(url);
          const data = await response.json();
          setResults(data.businesses || data);
        } catch (err) {
          alert('Search failed: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => {
        if (page === 'analytics') {
          loadAnalytics();
        }
      }, [page]);

      return (
        <div>
          <nav className="navbar">
            <div className="nav-container">
              <div className="nav-brand">
                <span>📊</span>
                Business Intelligence Platform
              </div>
              <ul className="nav-links">
                <li><a onClick={() => setPage('search')}>Search</a></li>
                <li><a onClick={() => setPage('analytics')}>Analytics</a></li>
                <li><a onClick={() => setPage('recommendations')}>Recommendations</a></li>
              </ul>
            </div>
          </nav>

          {page === 'search' && (
            <div className="container">
              <div className="page-header">
                <h1>Search Businesses</h1>
                <p>Find and explore businesses by name, category, or location</p>
              </div>

              <div className="tabs">
                <button className={`tab ${searchType === 'text' ? 'active' : ''}`} onClick={() => setSearchType('text')}>Text Search</button>
              </div>

              {searchType === 'location' ? (
                <form onSubmit={handleLocationSearch} className="search-form">
                  <div className="form-row">
                    <input
                      type="text"
                      placeholder="Enter city"
                      value={filters.city}
                      onChange={(e) => setFilters({ ...filters, city: e.target.value })}
                    />
                    <button type="submit" className="button" disabled={loading}>
                      {loading ? 'Searching...' : 'Search'}
                    </button>
                  </div>
                </form>
              ) : (
                <form onSubmit={handleSearch} className="search-form">
                  <div className="form-row">
                    <input
                      type="text"
                      placeholder={searchType === 'category' ? 'e.g., Restaurant, Coffee Shop' : 'Search businesses...'}
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                    />
                    <button type="submit" className="button" disabled={loading}>
                      {loading ? 'Searching...' : 'Search'}
                    </button>
                  </div>
                </form>
              )}

              {loading && <div className="loading">Loading results...</div>}
              {!loading && results.length === 0 && query && <div className="no-results">No businesses found. Try a different search.</div>}

              {!loading && results.length > 0 && (
                <div>
                  <p className="results-count">Found {results.length} businesses</p>
                  <div className="grid">
                    {results.map((biz) => (
                      <div key={biz._id} className="business-card">
                        <div className="business-header">
                          <h3>{biz.name}</h3>
                          <span className={`status-badge ${biz.status}`}>{biz.status}</span>
                        </div>
                        <p className="category">{biz.category}</p>
                        <p className="address">{biz.address?.street}, {biz.address?.city}</p>
                        <div className="business-stats">
                          <span className="rating">⭐ {biz.rating || 'N/A'}</span>
                          <span>({biz.review_count} reviews)</span>
                        </div>
                        {biz.phone_numbers?.[0] && <p className="phone">📞 {biz.phone_numbers[0]}</p>}
                        {biz.website && <a href={biz.website} target="_blank" rel="noopener noreferrer" className="website">🌐 Visit Website</a>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {page === 'analytics' && (
            <div className="container">
              <div className="page-header">
                <h1>Analytics Dashboard</h1>
                <p>Business insights and statistics</p>
              </div>

              {metrics && (
                <div className="metrics-grid">
                  <div className="metric-card">
                    <h3>Total Businesses</h3>
                    <p className="metric-value">{metrics.total_businesses || 0}</p>
                  </div>
                  <div className="metric-card">
                    <h3>Active</h3>
                    <p className="metric-value" style={{ color: '#28a745' }}>{metrics.active_businesses || 0}</p>
                  </div>
                  <div className="metric-card">
                    <h3>Average Rating</h3>
                    <p className="metric-value">⭐ {(metrics.average_rating || 0).toFixed(2)}</p>
                  </div>
                  <div className="metric-card">
                    <h3>Categories</h3>
                    <p className="metric-value">{metrics.total_categories || 0}</p>
                  </div>
                </div>
              )}

              <div className="stats-section">
                <p>Charts and detailed analytics coming soon...</p>
              </div>
            </div>
          )}

          {page === 'recommendations' && (
            <div className="container">
              <div className="page-header">
                <h1>Recommendations</h1>
                <p>Discover trending and personalized business recommendations</p>
              </div>
              <p style={{ textAlign: 'center', color: '#666', marginTop: '40px' }}>Trending recommendations coming soon...</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
