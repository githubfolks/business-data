  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  dashboard:
    build:
      context: ./dashboard
      args:
        - REACT_APP_API_URL=http://localhost:3001/api/v1
        - REACT_APP_GOOGLE_MAPS_API_KEY=${GOOGLE_PLACES_API_KEY}
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - business-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - business-net

volumes:
  redis_data:
  postgres_data:

networks:
  business-net:
    driver: bridge
  shared-net:
    external: true
    name: itgoa_itgoa-network
