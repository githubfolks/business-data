services:
  app:
    build: .
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - PORT=3000
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - business-net
      - shared-net

  dashboard:
    build:
      context: ./dashboard
      args:
        - REACT_APP_API_URL=http://65.20.90.180:3001/api/v1
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - business-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - business-net

volumes:
  redis_data:

networks:
  business-net:
    driver: bridge
  shared-net:
    external: true
    name: itgoa_itgoa-network
