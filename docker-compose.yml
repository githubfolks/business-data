services:
  app:
    build: .
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - PORT=3000
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - business-net
      - shared-net

  dashboard:
    build:
      context: ./dashboard
      args:
        - REACT_APP_API_URL=/api/v1
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - business-net

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - dashboard
    restart: unless-stopped
    networks:
      - business-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - business-net

volumes:
  redis_data:

networks:
  business-net:
    driver: bridge
  shared-net:
    external: true
    name: odoo_saas_network
